<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabam Bot - Local Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Open Sans", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .favorite-item {
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .favorite-item h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .favorite-item p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .btn-buy-now {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
            pointer-events: none;
        }

        .btn-buy-now[style*="display: inline-block"] {
            pointer-events: auto;
        }

        .btn-buy-now:hover {
            background: #E55A24;
        }

        .btn-buy-now:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Modal Styles */
        .v--modal-overlay {
            position: fixed;
            box-sizing: border-box;
            left: 0;
            top: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .v--modal-overlay.show {
            display: flex;
        }

        .v--modal-overlay .v--modal-background-click {
            width: 100%;
            min-height: 100%;
            height: 100vh;
            position: absolute;
            cursor: pointer;
        }

        .v--modal-box {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 90%;
            z-index: 1000;
        }

        .a-modal__content {
            padding: 30px 20px;
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .a-modal__content h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 20px;
        }

        .a-modal__content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .a-modal__buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .a-modal__buttons button {
            flex: 1;
            padding: 10px 20px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .a-modal__buttons button:nth-child(1) {
            background: white;
            border: 1px solid #ddd;
            color: #333;
        }

        .a-modal__buttons button:nth-child(1):hover {
            background: #f0f0f0;
        }

        .a-modal__buttons button:nth-child(2) {
            background: #FF6B35;
            color: white;
            border: 1px solid #FF6B35;
        }

        .a-modal__buttons button:nth-child(2):hover {
            background: #E55A24;
        }

        .state-indicator {
            background: #333;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        .log {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
        }

        .success {
            color: #27ae60;
        }

        .error {
            color: #e74c3c;
        }

        .info {
            color: #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="state-indicator">State: <span id="state">1 - Hemen Al Butonu Yok</span></div>

        <!-- Main Content -->
        <div class="favorite-item">
            <h3>Test Aracı - 2023 Model</h3>
            <p>Fiyat: 500.000 TL</p>
            <p>Durum: <strong id="status">Bekleniyor...</strong></p>
            <button class="btn-buy-now" id="btn-hemen-al" style="display: none;">HEMEN AL</button>
        </div>

        <!-- Modal Container -->
        <div id="modals-container">
            <div class="v--modal-overlay" id="modal-overlay">
                <div class="v--modal-background-click"></div>
                <div class="v--modal-box">
                    <div class="a-modal__content" id="modal-content">
                        <!-- Content will be inserted here -->
                    </div>
                    <div class="a-modal__buttons" id="modal-buttons">
                        <!-- Buttons will be inserted here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Log -->
        <div class="log" id="log">
            <div class="log-entry info">🔧 Test başladı...</div>
        </div>
    </div>

    <script>
        // State management
        let currentState = 1;

        // Log function
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // State transitions
        function setState(state) {
            currentState = state;
            const stateMap = {
                1: 'Hemen Al Butonu Yok',
                2: 'Hemen Al Butonu Var',
                3: 'Satın Al Paneli',
                4: 'Başarı Paneli'
            };
            document.getElementById('state').textContent = `${state} - ${stateMap[state]}`;
            addLog(`State değişti: ${stateMap[state]}`, 'info');
        }

        // Initialize state 1
        function initState1() {
            document.getElementById('btn-hemen-al').style.display = 'none';
            document.getElementById('status').textContent = 'Bekleniyor...';
            document.getElementById('modal-overlay').classList.remove('show');
        }

        // Show state 2
        function showState2() {
            setState(2);
            document.getElementById('btn-hemen-al').style.display = 'inline-block';
            document.getElementById('status').textContent = 'Hazır';
        }

        // Show state 3 - Satın Al Panel
        function showState3() {
            setState(3);
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            const buttons = document.getElementById('modal-buttons');

            content.innerHTML = '<h2>Satın Almayı Onayla</h2><p>Bu aracı satın almak istediğinizden emin misiniz?</p>';
            buttons.innerHTML = `
                <button onclick="closeModal()">İptal</button>
                <button onclick="showState4()">Satın Al</button>
            `;

            modal.classList.add('show');
            addLog('Satın Al paneli açıldı', 'info');
        }

        // Show state 4 - Success Panel
        function showState4() {
            setState(4);
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            const buttons = document.getElementById('modal-buttons');

            content.innerHTML = `
                <h2 style="color: #27ae60; font-size: 24px;">✅ Tebrikler!</h2>
                <p style="font-size: 18px; font-weight: 600; color: #27ae60;">Aracınız satın alındı</p>
                <p>Havale işlemi başlatılmıştır. Lütfen 5 iş günü içinde kontrol edin.</p>
            `;
            buttons.innerHTML = '<button onclick="closeModal()" style="background: #27ae60; color: white; border: none; cursor: pointer;">Tamam</button>';

            addLog('Başarı paneli gösterildi', 'success');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
            if (currentState === 4) {
                setState(1);
                initState1();
                addLog('Modal kapatıldı. State 1\'e döndü', 'info');
            }
        }

        // Button click handlers
        document.getElementById('btn-hemen-al').addEventListener('click', () => {
            addLog('HEMEN AL butonuna tıklandı', 'info');
            showState3();
        });

        // Close modal on background click
        document.querySelector('.v--modal-background-click').addEventListener('click', closeModal);

        // Simulate state progression
        function simulateTest() {
            addLog('Test simülasyonu başladı...', 'info');
            
            // State 1 - Initial
            setState(1);
            
            // State 2 after 30 seconds
            setTimeout(() => {
                addLog('Sayfa yenilendi, HEMEN AL butonu görülüyor', 'info');
                showState2();
            }, 30000);
        }

        // Start simulation when page loads
        window.addEventListener('load', () => {
            simulateTest();
        });
    </script>
</body>
</html>
